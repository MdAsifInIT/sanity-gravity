[plugin]
slug = "vnc"
name = "vnc"
kind = "connector"
api_version = "1"

[capabilities]
provides = ["remote-gui"]
requires = ["display"]

[build]
dockerfile = "Dockerfile"

[ports.vnc]
internal = 5901
default = 5901
env_var = "VNC_PORT"
legacy_slug = "vnc"

[ports.novnc]
internal = 6901
default = 6901
env_var = "NOVNC_PORT"
legacy_slug = "novnc"

[ports.ssh]
internal = 22
default = 2222
env_var = "SSH_HOST_PORT"
legacy_slug = "ssh"

[compose]
shm_size = "512m"
restart = "unless-stopped"
stop_grace_period = "30s"

[environment]
VNC_PW = "${VNC_PW:-${HOST_PASSWORD}}"
VNC_RESOLUTION = "${VNC_RESOLUTION:-1280x720}"
VNC_DEPTH = "${VNC_DEPTH:-24}"

[announce]
template = """
VNC Client: localhost:{ports.vnc}
noVNC Web:  http://localhost:{ports.novnc}/vnc.html
SSH:        ssh -p {ports.ssh} {user}@localhost
Password:   {password}
"""
