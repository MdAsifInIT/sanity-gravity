name: Reusable Publish

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote and Publish (All Architectures)
        run: |
          # Pull x64 and arm64 transient images
          docker pull ghcr.io/${{ github.repository }}-core:${{ inputs.tag }}-amd64
          docker pull ghcr.io/${{ github.repository }}-core:${{ inputs.tag }}-arm64
          
          # Create and push multi-arch manifest
          docker manifest create ghcr.io/${{ github.repository }}-core:latest \
            ghcr.io/${{ github.repository }}-core:${{ inputs.tag }}-amd64 \
            ghcr.io/${{ github.repository }}-core:${{ inputs.tag }}-arm64
          
          docker manifest push ghcr.io/${{ github.repository }}-core:latest

          # [Optional] Push specific release tag if applicable
          if [ "${{ github.event_name }}" == "release" ]; then
            TAG_NAME=${{ github.event.release.tag_name }}
            docker manifest create ghcr.io/${{ github.repository }}-core:${TAG_NAME} \
              ghcr.io/${{ github.repository }}-core:${{ inputs.tag }}-amd64 \
              ghcr.io/${{ github.repository }}-core:${{ inputs.tag }}-arm64
            docker manifest push ghcr.io/${{ github.repository }}-core:${TAG_NAME}
          fi
