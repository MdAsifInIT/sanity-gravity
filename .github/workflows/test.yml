name: Reusable Test

on:
  workflow_call:
    inputs:
      arch:
        required: true
        type: string
      repo_lc:
        required: true
        type: string
      tag:
        required: true
        type: string

jobs:
  test:
    runs-on: ${{ inputs.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Transient Images
        run: |
          # Pull and tag all dimension-based images
          for tag in ag-xfce-ssh ag-xfce-kasm ag-xfce-vnc; do
            docker pull ghcr.io/${{ inputs.repo_lc }}-${tag}:${{ inputs.tag }}-${{ inputs.arch }}
            docker tag ghcr.io/${{ inputs.repo_lc }}-${tag}:${{ inputs.tag }}-${{ inputs.arch }} sanity-gravity:${tag}
          done

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Test Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y socat
          python -m pip install --upgrade pip
          pip install pytest requests urllib3 PyYAML pytest-timeout

      - name: Run Integration Tests
        run: |
          chmod +x ./sanity-cli
          ./sanity-cli test
