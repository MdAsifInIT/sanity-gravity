name: Sanity Gravity CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'README_*.md'
      - 'CONTRIBUTING.md'
      - 'LICENSE'
      - 'SECURITY.md'
      - 'assets/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'README_*.md'
      - 'CONTRIBUTING.md'
      - 'LICENSE'
      - 'SECURITY.md'
      - 'assets/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y socat
        python -m pip install --upgrade pip
        pip install pytest requests urllib3 PyYAML pytest-timeout

    - name: Build Sandbox Images
      run: ./sanity-cli build

    - name: Run Tests
      run: ./sanity-cli test
