name: Sanity Gravity CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, feat/*, fix/* ]
  release:
    types: [ published ]

permissions:
  contents: read
  packages: write

jobs:
  # 0. Global Setup
  setup:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
      tags: ${{ steps.vars.outputs.tags }}
      repo_lc: ${{ steps.lowercase.outputs.repo_lc }}
    steps:
      - name: Checkout Code (Full History)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: lowercase
        run: echo "repo_lc=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Generate Multi-Tag Metadata
        id: vars
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "short_sha=${SHA_SHORT}" >> $GITHUB_OUTPUT
          
          # Initialize variables
          TAG_LIST="sha-${SHA_SHORT}"
          
          # Check if this is a Tag Push (e.g. v0.1.0) or a GitHub Release
          if [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" == v* ]]; then
            TAG_LIST="${TAG_LIST},latest,${{ github.ref_name }}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            TAG_LIST="${TAG_LIST},latest,${{ github.event.release.tag_name }}"
          fi
          
          echo "tags=${TAG_LIST}" >> $GITHUB_OUTPUT

  # 1. Parallel Build Phase
  build-x64:
    needs: [setup]
    uses: ./.github/workflows/build-arch.yml
    with:
      arch: amd64
      repo_lc: ${{ needs.setup.outputs.repo_lc }}
      tag: sha-${{ needs.setup.outputs.short_sha }}
    secrets: inherit

  build-arm64:
    needs: [setup]
    uses: ./.github/workflows/build-arch.yml
    with:
      arch: arm64
      repo_lc: ${{ needs.setup.outputs.repo_lc }}
      tag: sha-${{ needs.setup.outputs.short_sha }}
    secrets: inherit

  # 2. Parallel Test & Check Phase
  test-x64:
    needs: [setup, build-x64]
    uses: ./.github/workflows/test.yml
    with:
      arch: amd64
      repo_lc: ${{ needs.setup.outputs.repo_lc }}
      tag: sha-${{ needs.setup.outputs.short_sha }}
    secrets: inherit

  check-x64:
    needs: [setup, build-x64]
    uses: ./.github/workflows/check.yml
    with:
      arch: amd64
      repo_lc: ${{ needs.setup.outputs.repo_lc }}
      tag: sha-${{ needs.setup.outputs.short_sha }}
    secrets: inherit

  test-arm64:
    needs: [setup, build-arm64]
    uses: ./.github/workflows/test.yml
    with:
      arch: arm64
      repo_lc: ${{ needs.setup.outputs.repo_lc }}
      tag: sha-${{ needs.setup.outputs.short_sha }}
    secrets: inherit

  check-arm64:
    needs: [setup, build-arm64]
    uses: ./.github/workflows/check.yml
    with:
      arch: arm64
      repo_lc: ${{ needs.setup.outputs.repo_lc }}
      tag: sha-${{ needs.setup.outputs.short_sha }}
    secrets: inherit

  # 3. Final Multi-arch Publish Phase (Only if all tests and security checks pass)
  publish:
    # SOTA: Only publish Multi-arch manifest when a version tag (v*) is pushed or a release is created
    if: github.event_name == 'release' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    needs: [setup, test-x64, test-arm64, check-x64, check-arm64]
    uses: ./.github/workflows/publish.yml
    with:
      repo_lc: ${{ needs.setup.outputs.repo_lc }}
      transient_tag: sha-${{ needs.setup.outputs.short_sha }}
      tags_csv: ${{ needs.setup.outputs.tags }}
    secrets: inherit
