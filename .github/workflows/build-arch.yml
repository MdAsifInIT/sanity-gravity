name: Reusable Build

on:
  workflow_call:
    inputs:
      arch:
        required: true
        type: string
      repo_lc:
        required: true
        type: string
      tag:
        required: true
        type: string

jobs:
  build:
    runs-on: ${{ inputs.arch == 'arm64' && 'ubuntu-24.04-arm64' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build via Sanity CLI
        run: |
          chmod +x ./sanity-cli
          ./sanity-cli build

      - name: Tag and Push (Transient Tag)
        run: |
          REPO_LC="${{ inputs.repo_lc }}"
          TAG_VAL="${{ inputs.tag }}"
          ARCH_VAL="${{ inputs.arch }}"
          
          # Tag local images to GHCR transient addresses
          docker tag sanity-gravity:core ghcr.io/${REPO_LC}-core:${TAG_VAL}-${ARCH_VAL}
          docker tag sanity-gravity:kasm ghcr.io/${REPO_LC}-kasm:${TAG_VAL}-${ARCH_VAL}
          docker tag sanity-gravity:vnc ghcr.io/${REPO_LC}-vnc:${TAG_VAL}-${ARCH_VAL}
          
          # Push to GHCR
          docker push ghcr.io/${REPO_LC}-core:${TAG_VAL}-${ARCH_VAL}
          docker push ghcr.io/${REPO_LC}-kasm:${TAG_VAL}-${ARCH_VAL}
          docker push ghcr.io/${REPO_LC}-vnc:${TAG_VAL}-${ARCH_VAL}
