name: Reusable Build

on:
  workflow_call:
    inputs:
      arch:
        required: true
        type: string
      repo_lc:
        required: true
        type: string
      tag:
        required: true
        type: string

jobs:
  build-all:
    name: Build All (${{ inputs.arch }})
    runs-on: ${{ inputs.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 40
    permissions:
      contents: read
      packages: write
    env:
      DOCKER_DEFAULT_PLATFORM: linux/${{ inputs.arch }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build all images (layered, single runner)
        run: |
          chmod +x ./sanity-cli
          ./sanity-cli build all

      - name: Push final images
        run: |
          REPO_LC="${{ inputs.repo_lc }}"
          TAG_VAL="${{ inputs.tag }}"
          ARCH_VAL="${{ inputs.arch }}"

          for tag in $(./sanity-cli list --json | python3 -c "import sys,json; [print(t) for t in json.load(sys.stdin)]"); do
            docker tag sanity-gravity:${tag} ghcr.io/${REPO_LC}-${tag}:${TAG_VAL}-${ARCH_VAL}
            docker push ghcr.io/${REPO_LC}-${tag}:${TAG_VAL}-${ARCH_VAL}
          done
