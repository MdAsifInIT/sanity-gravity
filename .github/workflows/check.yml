name: Reusable Security Scan

on:
  workflow_call:
    inputs:
      arch:
        required: true
        type: string
      repo_lc:
        required: true
        type: string
      tag:
        required: true
        type: string

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Security Scan - ag-xfce-ssh
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ inputs.repo_lc }}-ag-xfce-ssh:${{ inputs.tag }}-${{ inputs.arch }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Security Scan - ag-xfce-kasm
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ inputs.repo_lc }}-ag-xfce-kasm:${{ inputs.tag }}-${{ inputs.arch }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Security Scan - ag-xfce-vnc
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ inputs.repo_lc }}-ag-xfce-vnc:${{ inputs.tag }}-${{ inputs.arch }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
